<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Maps Scraper</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <img src="../icons/icon48.png" alt="Logo" class="logo">
      <h1>Maps Scraper</h1>
    </header>

    <div class="stats-card">
      <div class="stat">
        <span class="stat-value" id="count">0</span>
        <span class="stat-label">Negocios Detectados</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="status">Inactivo</span>
        <span class="stat-label">Estado</span>
      </div>
    </div>

    <div class="actions">
      <button id="deepScrapeBtn" class="btn primary" style="background-color: #fbbc04; color: #202124;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
        Deep Scrape
      </button>
      <button id="refreshBtn" class="btn secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6" />
          <path d="M1 20v-6h6" />
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
        </svg>
        Actualizar
      </button>
      <button id="downloadBtn" class="btn primary" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Descargar CSV
      </button>
      <button id="clearBtn" class="btn danger">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          <line x1="10" y1="11" x2="10" y2="17" />
          <line x1="14" y1="11" x2="14" y2="17" />
        </svg>
        Borrar
      </button>
    </div>

    <div class="preview">
      <h3>Vista Previa <small>(Últimos 5)</small></h3>
      <div id="table-container">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Rating</th>
              <th>Teléfono</th>
            </tr>
          </thead>
          <tbody id="previewBody">
            <!-- Data will be inserted here -->
            <tr class="empty-state">
              <td colspan="3">Navega en Google Maps para detectar negocios...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
